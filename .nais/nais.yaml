apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: {{ app.name }}
  namespace: {{ app.namespace }}
  labels:
    team: {{ app.team }}
spec:
  image: {{ image }}
  port: 8080
  liveness:
    path: actuator/health/liveness
    initialDelay: 5
  readiness:
    path: actuator/health/readiness
    initialDelay: 5
  startup:
    path: actuator/health/readiness
    initialDelay: 5
    failureThreshold: 30
    periodSeconds: 1
  replicas:
    min: 2
    max: 2
    cpuThresholdPercentage: 75
  resources:
    limits:
      memory: 1024Mi
    requests:
      cpu: 40m
      memory: 384Mi
  ingresses:
    - {{app.ingress}}
  azure:
    application:
      enabled: true
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
      destinations:
        - id: "grafana-lgtm"
    logging:
      destinations:
        - id: elastic
        - id: loki
  webproxy: true
  env:
    - name: "ENVIRONMENT_NAME"
      value: {{ app.env }}
    - name: SPRING_PROFILES_ACTIVE
      value: {{ app.profile }}
  envFrom:
    - secret: {{ app.name }}-unleash-api-token
